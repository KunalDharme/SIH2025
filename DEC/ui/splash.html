<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Evidence Categorizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: 
                radial-gradient(circle at 20% 30%, rgba(25, 118, 210, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(66, 165, 245, 0.1) 0%, transparent 100%),
                radial-gradient(circle at 40% 80%, rgba(100, 181, 246, 0.08) 0%, transparent 50%),
                linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 25%, #16213e 50%, #1a1a2e 75%, #0a0a0a 100%);
            color: rgb(255, 255, 255);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 1px 1px, rgba(255,255,255,0.15) 1px, transparent 0);
            background-size: 20px 20px;
            opacity: 0.1;
            animation: backgroundMove 20s linear infinite;
        }

        @keyframes backgroundMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(20px, 20px); }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
        }

        .rotating-ring {
            position: absolute;
            width: 180px;
            height: 180px;
            left: 10px;
            top: 10px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(25, 118, 210, 0.3) 15deg,
                rgba(25, 118, 210, 0.8) 30deg,
                rgba(42, 165, 245, 0.9) 45deg,
                rgba(66, 165, 245, 1) 60deg,
                rgba(100, 181, 246, 1) 75deg,
                rgba(144, 202, 249, 0.9) 90deg,
                rgba(251, 187, 187, 0.8) 105deg,
                rgba(227, 242, 253, 0.6) 120deg,
                rgba(255, 255, 255, 0.4) 135deg,
                rgba(255, 255, 255, 0.2) 150deg,
                transparent 165deg,
                transparent 360deg
            );
            animation: rotate 3s linear infinite;
            filter: blur(0.5px);
        }

        .rotating-ring::before {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(25, 118, 210, 0.1) 15deg,
                rgba(25, 118, 210, 0.4) 30deg,
                rgba(42, 165, 245, 0.5) 45deg,
                rgba(66, 165, 245, 0.6) 60deg,
                rgba(100, 181, 246, 0.6) 75deg,
                rgba(144, 202, 249, 0.5) 90deg,
                rgba(187, 222, 251, 0.4) 105deg,
                rgba(227, 242, 253, 0.3) 120deg,
                rgba(255, 255, 255, 0.2) 135deg,
                rgba(255, 255, 255, 0.1) 150deg,
                transparent 165deg,
                transparent 360deg
            );
            animation: rotate 4s linear infinite reverse;
        }

        .inner-circle {
            position: absolute;
            width: 140px;
            height: 140px;
            left: 30px;
            top: 30px;
            background: 
                radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(25, 118, 210, 0.1) 0%, transparent 50%),
                radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
            border-radius: 50%;
            border: 2px solid rgba(25, 118, 210, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 0 30px rgba(25, 118, 210, 0.4),
                inset 0 0 20px rgba(0, 0, 0, 0.5),
                inset 0 0 40px rgba(25, 118, 210, 0.1);
        }

        .magnifying-glass {
            position: relative;
            width: 60px;
            height: 60px;
        }

        .lens {
            width: 50px;
            height: 50px;
            border: 3px solid #1976D2;
            border-radius: 50%;
            position: relative;
            background: 
                radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.2) 0%, transparent 30%),
                radial-gradient(circle at 70% 70%, rgba(25, 118, 210, 0.15) 0%, transparent 50%),
                radial-gradient(circle, rgba(25, 118, 210, 0.1) 0%, transparent 100%);
            box-shadow: 
                0 0 15px rgba(25, 118, 210, 0.5),
                inset 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .handle {
            position: absolute;
            width: 20px;
            height: 3px;
            background: linear-gradient(45deg, 
                rgba(102, 102, 102, 0.8) 0%, 
                rgba(153, 153, 153, 1) 50%, 
                rgba(102, 102, 102, 0.8) 100%);
            bottom: -8px;
            right: -8px;
            transform: rotate(45deg);
            border-radius: 2px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: linear-gradient(90deg, 
                rgba(25, 118, 210, 0.8) 0%, 
                rgba(25, 118, 210, 1) 50%, 
                rgba(25, 118, 210, 0.8) 100%);
            box-shadow: 0 0 3px rgba(25, 118, 210, 0.8);
        }

        .crosshair::before {
            width: 20px;
            height: 1px;
            left: -10px;
            top: 0;
        }

        .crosshair::after {
            width: 1px;
            height: 20px;
            left: 0;
            top: -10px;
            background: linear-gradient(180deg, 
                rgba(25, 118, 210, 0.8) 0%, 
                rgba(25, 118, 210, 1) 50%, 
                rgba(25, 118, 210, 0.8) 100%);
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(45deg, 
                #1976D2 0%, 
                #42A5F5 25%, 
                #64B5F6 50%, 
                #42A5F5 75%, 
                #1976D2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(25, 118, 210, 0.3);
        }

        .subtitle {
            font-size: 16px;
            color: #888;
            margin-bottom: 50px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .loading-container {
            position: relative;
            margin-top: 30px;
        }

        .loading-bar {
            width: 300px;
            height: 4px;
            background: 
                linear-gradient(90deg, #333 0%, #444 50%, #333 100%);
            border-radius: 2px;
            overflow: hidden;
            margin: 0 auto 15px;
            box-shadow: 
                inset 0 1px 3px rgba(0, 0, 0, 0.5),
                0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, 
                #1976D2 0%, 
                #42A5F5 25%, 
                #64B5F6 50%, 
                #42A5F5 75%, 
                #1976D2 100%);
            width: 0%;
            animation: loadProgress 4s ease-in-out infinite;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(25, 118, 210, 0.6);
        }

        .loading-text {
            font-size: 14px;
            color: #666;
            animation: loadingDots 2s infinite;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .version {
            position: absolute;
            bottom: 30px;
            right: 30px;
            font-size: 12px;
            color: #444;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.1);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            50% { width: 60%; }
            100% { width: 100%; }
        }

        @keyframes loadingDots {
            0%, 20% { content: "Loading"; }
            40% { content: "Loading."; }
            60% { content: "Loading.."; }
            80%, 100% { content: "Loading..."; }
        }

        .pulse {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 1px solid rgba(25, 118, 210, 0.3);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, 
                rgba(25, 118, 210, 0.15) 0%, 
                rgba(66, 165, 245, 0.1) 30%, 
                transparent 70%);
            border-radius: 50%;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            0% { opacity: 0.3; transform: scale(0.95); }
            100% { opacity: 0.8; transform: scale(1.05); }
        }

        /* Additional background elements */
        .bg-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(25, 118, 210, 0.3);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .bg-particle:nth-child(1) {
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .bg-particle:nth-child(2) {
            top: 60%;
            left: 80%;
            animation-delay: 2s;
        }

        .bg-particle:nth-child(3) {
            top: 80%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); opacity: 0.3; }
            50% { transform: translateY(-20px) scale(1.2); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="bg-particle"></div>
    <div class="bg-particle"></div>
    <div class="bg-particle"></div>
    
    <div class="container">
        <div class="logo-container">
            <div class="glow"></div>
            <div class="pulse"></div>
            <div class="rotating-ring"></div>
            <div class="inner-circle">
                <div class="magnifying-glass">
                    <div class="lens">
                        <div class="crosshair"></div>
                    </div>
                    <div class="handle"></div>
                </div>
            </div>
        </div>

        <div class="title">DIGITAL EVIDENCE CATEGORIZER</div>
        <div class="subtitle">Forensic Analysis System</div>

        <div class="loading-container">
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
            <div class="loading-text">Loading forensic modules...</div>
        </div>
    </div>

    <div class="version">v3.2.1</div>

    <script>
        // Simulate loading stages
        const loadingTexts = [
            "Initializing core systems...",
            "Loading neural networks...",
            "Calibrating sensors...",
            "Establishing connections...",
            "Validating modules...",
            "Ready for analysis"
        ];

        let currentStage = 0;
        const loadingText = document.querySelector('.loading-text');

        setInterval(() => {
            if (currentStage < loadingTexts.length - 1) {
                currentStage++;
                loadingText.textContent = loadingTexts[currentStage];
            }
        }, 800);

        // Auto redirect after 5 seconds (simulate)
        setTimeout(() => {
            console.log("Switching to login page...");
            // Here you would call your switch_callback("login")
        }, 5000);
    </script>
</body>
</html>
